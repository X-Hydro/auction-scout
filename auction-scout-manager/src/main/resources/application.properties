# Spring Boot defaults to 8080, which is already used by the local
# frontend static server ? this must stay 8081 to match what
# register.html/post-login.html/preferences.html all hardcode as
# API_BASE_URL for local testing.
server.port=8081

# Database path is env-overridable so local dev and cloud deployment can
# point at completely different locations without touching this file.
#
# Local (default, if AUCTIONSCOUT_DB_PATH is unset): a gitignored folder
# inside the repo.
# Cloud: set AUCTIONSCOUT_DB_PATH=/opt/auction-scout-manager/auctionscout-manage.db
# on the VM ? matches the existing /opt/<service-name>/ convention (e.g.
# oncoord-proxy's usage.db lives at /opt/oncoord-proxy/usage.db).
auctionscout.db.path=${AUCTIONSCOUT_DB_PATH:./data/auctionscout-manage.db}

# Separate SQLite file written by the Python scraping pipeline ? NOT the
# same database as auctionscout-manage.db above, but confirmed to live
# in the same data/ directory locally. On the VM, expect it alongside
# auctionscout-manage.db under /opt/auction-scout-manager/ as well,
# matching the same convention, unless the Python pipeline deploys
# somewhere else ? worth confirming when that's set up.
auctionscout.properties-db.path=${AUCTIONSCOUT_PROPERTIES_DB_PATH:./data/auctionscout.db}

spring.datasource.url=jdbc:sqlite:${auctionscout.db.path}
spring.datasource.driver-class-name=org.sqlite.JDBC

# SQLite locks the whole file on write ? cap the pool at 1 connection so
# a registration burst can't throw "database is locked" instead of
# queueing. Low volume for a subscriber list, so this isn't a bottleneck.
spring.datasource.hikari.maximum-pool-size=1

recaptcha.secret-key=${RECAPTCHA_SECRET_KEY}

# Auto-run schema on every startup ? safe because auction-scout-manager.sql
# uses CREATE TABLE IF NOT EXISTS throughout. Explicit "always" is required
# because Spring only auto-runs schema files for databases it recognizes
# as embedded (H2, HSQLDB, Derby) ? SQLite doesn't qualify, so without
# this line the file would silently never execute.
#
# schema-locations is set explicitly below because the file isn't named
# schema.sql (Spring's default-discovery name) ? without this line,
# Spring wouldn't know to look for auction-scout-manager.sql at all.
spring.sql.init.mode=always
spring.sql.init.continue-on-error=false
spring.sql.init.schema-locations=classpath:auction-scout-manager.sql

# Standard SMTP config ? works with any provider that offers SMTP relay
# (SendGrid, Amazon SES, Mailgun, etc.). If oncoord-manager sends mail
# through a provider's REST API instead of SMTP, this needs to change
# to match rather than run two different mail mechanisms on the same VM.
spring.mail.host=${SMTP_HOST}
spring.mail.port=${SMTP_PORT:587}
spring.mail.username=${SMTP_USERNAME}
spring.mail.password=${SMTP_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

auctionscout.mail.from=${AUCTIONSCOUT_MAIL_FROM:AuctionScout <auctionscout@oncoord.com>}

# Site root the magic link is built against ? post-login.html lives here,
# not the API host, since the link needs to land on an actual page.
auctionscout.app.base-url=${AUCTIONSCOUT_APP_BASE_URL:https://www.oncoord.com}